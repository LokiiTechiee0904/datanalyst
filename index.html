<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Data Analyst Roadmap</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        /* Modified background properties */
        background-image: linear-gradient(rgba(26, 26, 26, 0.8), rgba(26, 26, 26, 0.8)), url('background.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        color: #ffffff;
        line-height: 1.6;
      }

      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(26, 26, 26, 0.9);
        border-bottom: 2px solid #00d4ff;
        padding: 12px 24px;
        z-index: 300;
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .instructor-name {
        color: #00ff88;
        font-weight: 700;
        font-size: 1.1rem;
      }

      .hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 24px;
        text-align: center;
        margin-top: 60px;
      }

      .hero h1 {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 700;
        margin-bottom: 16px;
        background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero p {
        font-size: clamp(1rem, 2.5vw, 1.25rem);
        color: #e0e0e0;
        max-width: 600px;
      }

      nav {
        position: fixed;
        top: 60px;
        left: 0;
        right: 0;
        background-color: rgba(26, 26, 26, 0.85);
        backdrop-filter: blur(10px);
        padding: 16px;
        border-bottom: 1px solid #333;
        z-index: 100;
      }

      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }

      .nav-btn {
        background: rgba(0, 212, 255, 0.1);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
        text-transform: uppercase;
      }

      .nav-btn:hover {
        background: rgba(0, 212, 255, 0.2);
        transform: translateY(-2px);
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        z-index: 200;
        padding: 24px;
      }

      .modal.active {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: #1a1a1a;
        border: 2px solid #00d4ff;
        border-radius: 16px;
        padding: 32px;
        max-width: 800px;
        width: 100%;
        position: relative;
      }

      .close-btn {
        position: absolute;
        top: 16px;
        right: 16px;
        background: none;
        border: none;
        color: #00ff88;
        font-size: 32px;
        cursor: pointer;
      }

      footer {
        background-color: rgba(26, 26, 26, 0.9);
        border-top: 1px solid #333;
        padding: 32px 24px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <h1 style="font-size: 1.5rem; background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">EXPLORING DATA ANALYSIS</h1>
      <div class="instructor-name">LOGESHWARAN S</div>
    </div>

    <nav>
      <div class="nav-container">
        <button class="nav-btn" onclick="openModal('process')">Data Analysis?</button>
        <button class="nav-btn" onclick="openModal('mindset')">Mindset > Skillset</button>
        <button class="nav-btn" onclick="openModal('technical')">Technical Keywords</button>
        <button class="nav-btn" onclick="openModal('databases')">Databases</button>
        <button class="nav-btn" onclick="openModal('sql')">SQL & PL/SQL</button>
        <button class="nav-btn" onclick="openModal('nosql')">NoSQL</button>
        <button class="nav-btn" onclick="openModal('python')">Python & BI</button>
      </div>
    </nav>

    <div class="hero">
      <h1>The Data Analyst - YOUR COMPREHENSIVE GUIDE</h1>
      <p>Your complete guide to becoming a skilled data analyst. Learn the process, mindset, and tools you need to turn raw data into meaningful insights.</p>
    </div>
    
    <script>
        function openModal(id) { document.getElementById('modal-' + id).classList.add('active'); }
        function closeModal(id) { document.getElementById('modal-' + id).classList.remove('active'); }
    </script>
  </body>
</html>
